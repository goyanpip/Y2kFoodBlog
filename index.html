<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>個人佳牌冰箱布丁部落格 - ✧*｡٩(ˊᗜˋ*)و✧*｡</title>
    <script src="https://unpkg.com/cursor-effects@latest/dist/browser.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@magenta/music@1.23.1/es6/core.js"></script>

    <style>
        body {
            font-family: "MS PGothic", "PMingLiU", "新細明體", serif;
            background-color: #000080;
            background-image: url('https://file.garden/ZWlUCY4S7Xz2vypS/archived%20backgrounds/colours/blue/0000201-tile.jpg');
            background-repeat: repeat;
            color: #00FF00;
            margin: 0; padding: 0;
            cursor: crosshair;
        }

        /* 5. 日本網站風格的 Pink Banner Title */
        .pink-banner {
            background-color: #FF69B4;
            color: #FFFFFF;
            padding: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            border-bottom: 5px double #FFFFFF;
            box-shadow: 0px 5px 0px #C71585;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 10px;
        }

        .wrapper {
            display: table; width: 100%; max-width: 1000px;
            margin: 0 auto; background-color: rgba(0, 0, 0, 0.8);
            border: 5px ridge #FF00FF;
        }

        .sidebar {
            display: table-cell; width: 200px; padding: 15px;
            vertical-align: top; border-right: 3px dashed #FFFF00;
        }

        .main-content {
            display: table-cell; padding: 20px; vertical-align: top;
        }

        /* 留言板樣式 */
        .bbs-section {
            margin-top: 50px;
            border: 2px solid #00FFFF;
            background: #222;
            padding: 15px;
        }
        .bbs-input {
            width: 100%; background: #000; color: #00FF00;
            border: 1px solid #00FF00; margin-bottom: 5px;
        }

        /* 4. 紅色禁止轉載文字 */
        .no-copy {
            color: #FF0000;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            margin: 20px 0;
        }

        /* MIDI 控制按鈕 */
        #music-control {
            position: fixed; bottom: 10px; right: 10px;
            background: #FF69B4; color: white; padding: 5px;
            font-size: 12px; border: 2px outset #fff; cursor: pointer;
        }

        /* 朋友 Banner */
        .friend-banner {
            border: 1px solid #fff;
            padding: 5px;
            background: linear-gradient(to bottom, #444, #000);
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="pink-banner">
    💖 歡迎光臨！個人佳牌冰箱布丁の迷宮 💖
</div>

<div id="music-control" onclick="playMidi()">🎵 點我播放背景音樂 (BGM ON)</div>
<script>
    function playMidi() {
        // 現代瀏覽器不支援直接播放 .mid，這是一個替代提示
        // 建議將 .mid 轉為 .mp3 或使用特定 Library
        // 這裡我們模擬播放，請確認根目錄有 S2_midi.mid
        const audio = new Audio('S2_midi.mid');
        audio.loop = true;
        audio.play().catch(e => alert("請點擊頁面任何地方以啟用音樂！"));
        document.getElementById('music-control').innerText = "🎶 BGM PLAYING...";
    }
</script>

<div class="wrapper">
    <div class="sidebar">
        <center>
            <img src="https://blob.gifcities.org/gifcities/AXJLC6JI7OLYN7FPCN2NTWCRXJLPK73F.gif"><br>
            <span style="font-size:12px;">(人•ᴗ•♡) 你好！</span>
        </center>
        
        <div style="border:1px solid #00FF00; padding:5px; margin-top:10px;">
            <p>➪ <a href="https://www.youtube.com/@goyanpip">My YouTube</a></p>
            <p>➪ <a href="https://goyanpip.github.io/my-timer/">加班台</a></p>
        </div>

        <p style="font-size:12px; margin-top:20px;">✧ 友情連結 ✧</p>
        <a href="https://github.com/bobo0909808675-byte" target="_blank" class="friend-banner">
            <span style="color:#fff; font-size:10px;">BOBO'S GITHUB</span><br>
            <marquee scrollamount="2" style="color:#00FFFF; font-size:10px;">Visit my friend!</marquee>
        </a>
    </div>

    <div class="main-content">
        <p>歡迎來到我的秘密基地 (๑˃ᴗ˂)ﻭ</p>
        <p>這裡只有最狂的食譜... ✌︎('ω')✌︎</p>

        <div style="background: #111; padding: 10px; border: 1px solid #FF00FF;">
             [這裡放之前的食譜內容，節省空間略過...]
        </div>

        <div class="no-copy">
            ※ 無断転載禁止 (禁止隨意轉載) m(_ _)m ※
        </div>

        <div class="bbs-section">
            <h3 style="margin:0; font-size:16px;">💬 訪客留言板 (BBS)</h3>
            <p style="font-size:12px;">歡迎留下你的足跡... (´｡• ᵕ •｡`) ♡</p>
            <input type="text" class="bbs-input" placeholder="名字/Name">
            <textarea class="bbs-input" rows="3" placeholder="留言內容/Comment"></textarea>
            <button style="width:100%; cursor:help;" onclick="alert('留言功能建設中！(っ˘ω˘ς )')">送信 (Send)</button>
            
            <div style="margin-top:10px; border-top:1px dotted #555; padding-top:5px; font-size:12px;">
                <b>管理員：</b> 歡迎大家多來踩踩！ <small>2026/04/07</small>
            </div>
        </div>
    </div>
</div>

<script>
    // 彩虹滑鼠
    window.addEventListener("load", () => {
        new cursoreffects.rainbowCursor({
            length: 15, colors: ["#FF00FF", "#00FFFF", "#FFFF00"], size: 4
        });
    });
</script>

</body>
</html>
